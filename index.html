<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liger Panel</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e3a8a);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:420px;
    background:#fff;
    border-radius:28px;
    padding:30px 24px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,.25);
}

.logo{
    width:95px;
    height:95px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:18px;
}

h1{
    font-size:32px;
    color:#2563eb;
    margin-bottom:8px;
}

.sub{
    color:#6b7280;
    font-size:15px;
    margin-bottom:22px;
}

.features{
    text-align:left;
    background:#f8fafc;
    padding:18px;
    border-radius:16px;
    margin-bottom:20px;
    line-height:2;
    font-size:15px;
    color:#374151;
}

.info{
    font-size:14px;
    color:#6b7280;
    margin-bottom:20px;
    line-height:1.6;
}

.btn{
    display:block;
    width:100%;
    text-decoration:none;
    padding:16px;
    border-radius:14px;
    font-size:17px;
    font-weight:700;
    margin-top:14px;
    transition:.2s;
}

.order{
    background:#2563eb;
    color:#fff;
}

.tutorial{
    background:#eef2ff;
    color:#1e3a8a;
}

.btn:hover{
    transform:translateY(-2px);
}

.footer{
    margin-top:22px;
    font-size:13px;
    color:#9ca3af;
}
</style>
</head>

<body>

<div class="card">

<img src="logo.PNG" class="logo" alt="Liger Panel">

<h1>Liger Panel</h1>

<p class="sub">
Premium Social Media Growth Services
</p>

<div class="features">
✅ High-Quality Services<br>
⚡ Fast Delivery<br>
🛡️ Trusted Platform<br>
📱 Easy Dashboard
</div>

<p class="info">
🎥 <strong>First time here?</strong><br>
Watch the tutorial before placing your order.
</p>

<a class="btn order" href="https://ligerpanel.com">
🚀 Start Your Order
</a>

<a class="btn tutorial" href="https://youtube.com/watch?v=LU2IalvN_l8&si=5bj4fCjT2nXlwqCc">
🎥 Watch Tutorial
</a>

<div class="footer">
Fast • Secure • Reliable
</div>

</div>

</body>
</html>
