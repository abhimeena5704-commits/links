<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liger Panel</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#2563eb);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.card{
    width:100%;
    max-width:420px;
    background:#fff;
    border-radius:24px;
    padding:35px 25px;
    box-shadow:0 15px 40px rgba(0,0,0,.2);
    text-align:center;
}

h1{
    font-size:38px;
    color:#2563eb;
    margin-bottom:8px;
}

.subtitle{
    color:#666;
    font-size:16px;
    margin-bottom:24px;
}

.features{
    text-align:left;
    background:#f8fafc;
    padding:18px;
    border-radius:14px;
    line-height:1.9;
    margin-bottom:22px;
    color:#333;
}

.note{
    color:#555;
    font-size:14px;
    margin-bottom:18px;
}

.btn{
    display:block;
    text-decoration:none;
    padding:16px;
    border-radius:14px;
    font-size:18px;
    font-weight:bold;
    margin-top:14px;
}

.order{
    background:#2563eb;
    color:#fff;
}

.tutorial{
    background:#eef2ff;
    color:#1e3a8a;
}

.footer{
    margin-top:20px;
    color:#888;
    font-size:13px;
}
</style>
</head>

<body>

<div class="card">

<h1>🚀 Liger Panel</h1>

<p class="subtitle">
Premium Social Media Growth Services
</p>

<div class="features">
✅ High-Quality Services<br>
⚡ Fast Delivery<br>
🛡️ Trusted Platform<br>
📱 Easy Dashboard
</div>

<p class="note">
🎥 New here? Watch the tutorial before placing your order.
</p>

<a class="btn order" href="https://ligerpanel.com">
🔥 Start Your Order
</a>

<a class="btn tutorial" href="https://youtube.com/watch?v=LU2IalvN_l8&si=5bj4fCjT2nXlwqCc">
🎥 Watch Tutorial
</a>

<div class="footer">
Fast • Trusted • Secure
</div>

</div>

</body>
</html>
