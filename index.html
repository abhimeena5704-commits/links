<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liger Panel</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
}

body{
  background:linear-gradient(135deg,#0f172a,#1e3a8a);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;

.card{

  border-radius:50%;

}

  font-size:30px;
  color:#1d4ed8;
  margin-bottom:8px;
}

.subtitle{
  color:#666;
  font-size:15px;
  margin-bottom:20px;
}

.notice{
  background:#f3f4f6;
  border-radius:14px;
  padding:14px;
  margin-bottom:20px;
  color:#333;
  line-height:1.5;
  font-size:15px;
}

.btn{
  display:block;
  text-decoration:none;
  padding:16px;
  border-radius:14px;
  font-size:18px;
  font-weight:700;
  margin-top:14px;
}

.order{
  background:#2563eb;
  color:#fff;
}

.tutorial{
  background:#f3f4f6;
  color:#111;
}

.footer{
  margin-top:22px;
  font-size:13px;

}
</style>

</head>

</div>

</html>
