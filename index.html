<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Liger Panel | Premium Social Media Growth</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#0b1220,#111827,#1e3a8a);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:420px;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.15);
    border-radius:28px;
    padding:30px 22px;
    color:white;
    box-shadow:0 20px 50px rgba(0,0,0,.35);
}

.logo{
    width:80px;
    height:80px;
    margin:auto;
    border-radius:24px;
    background:white;
    color:#2563eb;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:34px;
    font-weight:bold;
}

h1{
    text-align:center;
    margin-top:18px;
    font-size:30px;
}

.subtitle{
    text-align:center;
    margin-top:10px;
    color:#d1d5db;
    line-height:1.6;
    font-size:15px;
}

.features{
    margin-top:28px;
    background:rgba(255,255,255,.08);
    border-radius:18px;
    padding:18px;
}

.features div{
    margin:10px 0;
    font-size:15px;
}

.btn{
    display:block;
    text-decoration:none;
    text-align:center;
    padding:16px;
    margin-top:18px;
    border-radius:16px;
    font-weight:700;
    font-size:17px;
    transition:.2s;
}

.order{
    background:white;
    color:#111827;
}

.tutorial{
    background:rgba(255,255,255,.12);
    color:white;
    border:1px solid rgba(255,255,255,.15);
}

.btn:hover{
    transform:translateY(-2px);
}

.note{
    margin-top:24px;
    text-align:center;
    font-size:13px;
    color:#cbd5e1;
}

.badge{
    display:inline-block;
    margin-top:18px;
    padding:8px 14px;
    border-radius:999px;
    background:rgba(34,197,94,.15);
    color:#bbf7d0;
    font-size:13px;
}
</style>

</head>

<body>

<div class="card">

<div class="logo">LP</div>

<h1>Liger Panel</h1>

<p class="subtitle">
Premium Social Media Growth Services<br>
Simple • Fast • Reliable
</p>

<center>
<div class="badge">
Trusted Platform
</div>
</center>

<div class="features">
<div>🚀 Fast Order Processing</div>
<div>⭐ High-Quality Services</div>
<div>📱 Easy Dashboard</div>
<div>🔒 Secure Ordering Experience</div>
</div>

<a class="btn order"
href="https://ligerpanel.com">
🚀 Order Now
</a>

<a class="btn tutorial"
href="https://youtu.be/LU2IalvN_l8?si=4JArzx_eKqZ6meP_">
🎥 Watch Tutorial
</a>

<div class="note">
Need help getting started?<br>
Watch the tutorial first, then place your order.
</div>

</div>

</body>
</html>
